<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="El secreto de la lagartija: juego de acertijos numéricos inspirado en el antiguo Egipto."
    />
    <title>El secreto de la lagartija</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
  </head>

  <body>
    <main class="game-shell" aria-live="polite">
      <section class="hero-screen" id="introScreen">
        <div class="egyptian-frame">
          <div class="sun-disc" aria-hidden="true">𓇳</div>
          <p class="eyebrow">Templo de los enigmas</p>
          <h1>El secreto de la lagartija</h1>
          <p class="lead">
            Atraviesa las cámaras del templo resolviendo acertijos numéricos.
            Cada nivel superado quedará guardado en este dispositivo.
          </p>
          <div class="hero-actions">
            <button class="primary-button" id="startButton" type="button">Nueva aventura</button>
            <button class="secondary-button" id="continueButton" type="button">Continuar</button>
          </div>
        </div>
      </section>

      <section class="temple-card is-hidden" id="gameScreen" aria-labelledby="riddleTitle">
        <header class="game-header">
          <div>
            <p class="eyebrow">Cámara <span id="currentLevelLabel">1</span></p>
            <h2 id="riddleTitle">Acertijo</h2>
          </div>
          <div class="scarab-badge" title="Progreso">
            <span aria-hidden="true">𓆣</span>
            <strong id="progressText">0/0</strong>
          </div>
        </header>

        <div class="level-track" id="levelTrack" aria-label="Progreso por niveles"></div>

        <article class="riddle-panel">
          <span class="corner-glyph" aria-hidden="true">𓂀</span>
          <span class="lizard-mark" aria-hidden="true">🦎</span>
          <p id="riddleText">Cargando acertijo...</p>
        </article>

        <form class="answer-area" id="answerForm">
          <label for="answerInput">Respuesta numérica</label>
          <div class="answer-display" id="answerDisplay">—</div>
          <input id="answerInput" type="hidden" inputmode="numeric" />

          <div class="numeric-keypad" aria-label="Teclado numérico">
            <button type="button" data-key="1">1</button>
            <button type="button" data-key="2">2</button>
            <button type="button" data-key="3">3</button>
            <button type="button" data-key="4">4</button>
            <button type="button" data-key="5">5</button>
            <button type="button" data-key="6">6</button>
            <button type="button" data-key="7">7</button>
            <button type="button" data-key="8">8</button>
            <button type="button" data-key="9">9</button>
            <button type="button" data-action="clear">C</button>
            <button type="button" data-key="0">0</button>
            <button type="button" data-action="delete">⌫</button>
          </div>

          <button class="primary-button full" type="submit">Comprobar respuesta</button>
        </form>

        <p class="feedback" id="feedback" role="status"></p>

        <div class="footer-actions">
          <button class="secondary-button" id="resetButton" type="button">Reiniciar progreso</button>
        </div>
      </section>

      <section class="temple-card prize-screen is-hidden" id="prizeScreen">
        <div class="treasure" aria-hidden="true">𓂀</div>
        <p class="eyebrow">La última cámara se ha abierto</p>
        <h2 id="prizeTitle">Has descubierto el secreto</h2>
        <p id="prizeText"></p>
        <button class="primary-button" id="playAgainButton" type="button">Volver a jugar</button>
      </section>
    </main>

    <script type="module" src="/src/js/app.js"></script>
  </body>
</html>
